<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ouvrir dans Tawkit</title>
<style>
  :root {
    --bg: #14110B;
    --ink: #EDE6D6;
    --accent: #C9A54B;
    --sub: #9C9284;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .box { max-width: 360px; }
  .spinner {
    width: 42px;
    height: 42px;
    margin: 0 auto 18px;
    border: 4px solid rgba(201, 165, 75, 0.25);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 1.15em; margin: 0 0 8px; color: var(--accent); }
  p { font-size: 0.92em; color: var(--sub); line-height: 1.5; margin: 6px 0; }
  a.btn {
    display: inline-block;
    margin-top: 18px;
    padding: 10px 22px;
    border-radius: 999px;
    background: var(--accent);
    color: #14110B;
    font-weight: 600;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Ouverture de Tawkit…</h1>
    <p id="msg">Si l'application ne s'ouvre pas automatiquement, installez-la puis réessayez ce lien.</p>
    <a class="btn" href="https://github.com/TAOUKITPRAYER/azan/releases/latest">Installer Tawkit</a>
  </div>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var id = params.get('id') || '';
  if (!id) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').textContent = 'Lien invalide';
    document.getElementById('msg').textContent = "Aucun identifiant de mosquée fourni dans ce lien.";
    return;
  }
  // Redirection vers le schéma personnalisé géré par l'appli Android
  // (intent-filter tawkit://mosque/<id>, cf. AndroidManifest.xml). Si
  // l'appli n'est pas installée, rien ne se passe côté navigateur : cette
  // page + le bouton "Installer Tawkit" restent affichés en repli.
  location.href = 'tawkit://mosque/' + encodeURIComponent(id);
})();
</script>
</body>
</html>
